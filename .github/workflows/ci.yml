name: CI

on:
  pull_request:
    branches: [master]
  push:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run lint
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npx tsc --noEmit
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - id: pack
        run: echo "package=$(npm pack)" >> $GITHUB_OUTPUT
      - uses: actions/upload-artifact@v7
        with:
          name: build-package
          path: ${{ steps.pack.outputs.package }}

  integration-test:
    needs: [lint, typecheck, build]
    permissions:
      id-token: write
      contents: read
    strategy:
      matrix:
        runtime: [node-22, deno, bun]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v7
        with:
          name: build-package
      - name: Setup Node 22
        if: matrix.runtime == 'node-22'
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Setup Deno
        if: matrix.runtime == 'deno'
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Setup Bun
        if: matrix.runtime == 'bun'
        uses: oven-sh/setup-bun@v2
      - name: Install & test (${{ matrix.runtime }})
        working-directory: integration
        env:
          HARDPOINT_ORG_ID: ${{ secrets.HARDPOINT_ORG_ID }}
        run: |
          case "${{ matrix.runtime }}" in
            node-22)
              npm install ../hardpointlabs-sdk-*.tgz --omit=dev
              npm install --save-dev typescript @types/node
              npm run build
              npm test
              ;;
            deno)
              npm install ../hardpointlabs-sdk-*.tgz --omit=dev
              deno run --allow-all --node-modules-dir=manual test.ts
              ;;
            bun)
              bun install ../hardpointlabs-sdk-*.tgz
              bun run test.ts
              ;;
          esac

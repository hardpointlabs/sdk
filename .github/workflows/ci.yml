name: CI

on:
  pull_request:
    branches: [master]

permissions:
  id-token: write
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm -w packages/sdk run lint
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npx tsc --noEmit
        working-directory: packages/sdk
  build:
    name: Build
    runs-on: ubuntu-latest
    outputs:
      package-name: ${{ steps.pack.outputs.package }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - id: pack
        run: echo "package=$(npm pack)" >> $GITHUB_OUTPUT
        working-directory: packages/sdk
      - uses: actions/upload-artifact@v7
        with:
          name: build-package
          path: packages/sdk/${{ steps.pack.outputs.package }}
  integration-test:
    needs: [lint, typecheck, build]
    uses: ./.github/workflows/integration-test.yml
    with:
      package-name: ${{ needs.build.outputs.package-name }}
    secrets:
      HARDPOINT_ORG_ID: ${{ secrets.HARDPOINT_ORG_ID }}

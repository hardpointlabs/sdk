name: CI

on:
  pull_request:
    branches: [master]
  push:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run lint
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npx tsc --noEmit
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - id: pack
        run: echo "package=$(npm pack)" >> $GITHUB_OUTPUT
      - uses: actions/upload-artifact@v7
        with:
          name: build-package
          path: ${{ steps.pack.outputs.package }}
  integration-test:
    needs: [lint, typecheck, build]
    uses: ./.github/workflows/integration-test.yml
    secrets:
      HARDPOINT_ORG_ID: ${{ secrets.HARDPOINT_ORG_ID }}

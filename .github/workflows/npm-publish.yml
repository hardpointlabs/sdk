name: NPM Release

on:
  workflow_dispatch:
  release:
    types: [created]

permissions:
  id-token: write  # Required for OIDC
  contents: read

jobs:
  integration-test:
    strategy:
      matrix:
        runtime: [node-22, deno, bun]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm ci
      - run: npm run build
      - name: Setup Node 22
        if: matrix.runtime == 'node-22'
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Setup Deno
        if: matrix.runtime == 'deno'
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Setup Bun
        if: matrix.runtime == 'bun'
        uses: oven-sh/setup-bun@v2
      - name: Integration test (${{ matrix.runtime }})
        env:
          HARDPOINT_ORG_ID: ${{ secrets.HARDPOINT_ORG_ID }}
        run: |
          case "${{ matrix.runtime }}" in
            node-22) npm run integration-test:node ;;
            deno)    npm run integration-test:deno ;;
            bun)     npm run integration-test:bun ;;
          esac

  publish-npm:
    needs: [integration-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
      - run: npm ci
      - run: npm run build
      - run: npm publish
